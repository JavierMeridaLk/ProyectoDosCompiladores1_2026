<div class="toolbar">

  <!-- BRAND -->
  <div class="brand">
    <img src="assets/logo.png" height="26" />
    <span class="brand-name">YFERA</span>
    <span class="brand-sub">Framework</span>
  </div>

  <!-- MENÚ IZQUIERDO -->
  <nav class="menu">

    <div class="menu-item" (click)="toggle(); $event.stopPropagation()">
      Archivo
      @if (menus.archivo) {
        <div class="dropdown" (click)="$event.stopPropagation()">

          <div (click)="newFile(); closeAll()">
            <span class="dd-icon">+</span> Nuevo archivo
          </div>
          <div (click)="newFolder(); closeAll()">
            <span class="dd-icon">⊞</span> Nueva carpeta
          </div>

          <hr />

          <div (click)="newProject(); closeAll()">
            <span class="dd-icon">✦</span> Nuevo proyecto
          </div>
          <div (click)="loadProject(); closeAll()">
            <span class="dd-icon">↑</span> Cargar proyecto
          </div>

          <hr />

          <div (click)="save(); closeAll()">
            <span class="dd-icon">◈</span> Guardar
          </div>
          <div (click)="saveAll(); closeAll()">
            <span class="dd-icon">◈</span> Guardar todo
          </div>

        </div>
      }
    </div>

  </nav>

  <!-- SPACER -->
  <div class="toolbar-spacer"></div>

  <!-- ACCIONES DERECHAS -->
  <div class="actions">
    <button class="btn-preview" (click)="preview()" title="Abrir vista previa">
      ◈ Vista previa
    </button>
    <button class="btn-run" (click)="run()" title="Compilar y exportar">
      ▶ Ejecutar
    </button>
  </div>

</div>
