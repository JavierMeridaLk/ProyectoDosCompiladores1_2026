<div class="toolbar">

  <div class="brand">
    <img src="assets/logo.png" width="60" />
    {{ ideName }}
  </div>

  <div class="menu">

    <!-- ARCHIVO -->
    <div class="menu-item" (click)="toggle('archivo'); $event.stopPropagation()">
      Archivo

      <div class="dropdown" *ngIf="menus.archivo">

        <div (click)="newFile(); closeAll()">📄 Nuevo archivo</div>
        <div (click)="newFolder(); closeAll()">📁 Nueva carpeta</div>

        <hr />

        <div (click)="newProject(); closeAll()">📁Nuevo proyecto</div>
        <div (click)="loadProject(); closeAll()">📂 Cargar proyecto</div>

        <hr />

        <div (click)="save(); closeAll()">💾 Guardar</div>
        <div (click)="saveAll(); closeAll()">💾 Guardar todo</div>

      </div>
    </div>

    <!-- EJECUTAR -->
    <div class="menu-item" (click)="run()">
      Ejecutar
    </div>

    <!-- VISTA PREVIA -->
    <div class="menu-item" (click)="preview()">
      Vista previa
    </div>

    <!-- TERMINAL -->
    <div class="menu-item" (click)="openTerminal()">
      Nueva terminal
    </div>

  </div>

</div>
