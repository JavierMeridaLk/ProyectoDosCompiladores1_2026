<div class="ide-container" [style.--panel-height.px]="panelHeight">

  <header class="ide-header">
    <app-toolbar></app-toolbar>
  </header>

  <aside class="ide-sidebar">
    <app-sidebar></app-sidebar>
  </aside>

  <main class="ide-editor">
    <app-editor-space></app-editor-space>
  </main>

  <!-- poder direccionar el apartado de errores-->
  <div class="panel-resize-handle"
       (mousedown)="startResize($event)"
       title="Arrastrar para redimensionar el panel">
    <div class="resize-grip"></div>
  </div>

  <section class="ide-bottom-panel">
    <app-bottom-panel></app-bottom-panel>
  </section>

</div>
