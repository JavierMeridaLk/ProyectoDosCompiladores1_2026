<div class="sidebar-header" (click)="toggleRoot()">
  {{ rootOpen ? '📂' : '📁' }} {{ rootName }}
  <button 
    *ngIf="!hasProject"
    (click)="loadProject(); $event.stopPropagation()">
    📂
  </button>
</div>

<div class="file-tree">

  <div *ngIf="rootOpen">
    <ng-container 
      *ngTemplateOutlet="recursive; context:{ $implicit: tree }">
    </ng-container>
  </div>

</div>

<ng-template #recursive let-nodes>

  <div *ngFor="let node of nodes">

    <div class="tree-item"
      [style.padding-left.px]="node.depth * 16"
      draggable="true"
      (dragstart)="onDragStart(node)"
      (dragover)="onDragOver($event)"
      (drop)="onDrop(node)">

      <span (click)="toggle(node)">
        {{ getIcon(node) }} {{ node.name }}
      </span>

    <span class="actions">
      <button *ngIf="node.type === 'folder'" (click)="createFile(node, $event)">📄</button>
      <button *ngIf="node.type === 'folder'" (click)="createFolder(node, $event)">📁</button>
      <button (click)="delete(node, $event)">🗑</button>
    </span>

    </div>

    <div *ngIf="node.type === 'folder' && node.isOpen">
      <ng-container 
        *ngTemplateOutlet="recursive; context:{ $implicit: node.children }">
      </ng-container>
    </div>

  </div>

</ng-template>
