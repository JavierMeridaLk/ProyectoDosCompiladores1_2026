<div class="sidebar-header" (click)="toggleRoot()">
  {{ rootOpen ? '📂' : '📁' }} {{ rootName }}
  <button 
    *ngIf="!hasProject"
    (click)="loadProject(); $event.stopPropagation()">
    📂
  </button>
</div>

<div class="file-tree">

  <div *ngIf="rootOpen">

    <ng-container *ngTemplateOutlet="recursive; context:{ $implicit: tree }">
    </ng-container>

  </div>

</div>

<ng-template #recursive let-nodes>

  <div *ngFor="let node of nodes">

    <div class="tree-item"
        [class.folder]="node.type === 'folder'"
        [class.file]="node.type === 'file'"
        (click)="toggle(node)"
        draggable="true"
        (dragstart)="onDragStart(node)"
        (dragover)="onDragOver($event)"
        (drop)="onDrop(node)"
        [style.padding-left.px]="node.depth * 16">

      <span class="icon">{{ getIcon(node) }}</span>
      <span class="name">{{ node.name }}</span>

    </div>

    <div *ngIf="node.type === 'folder' && node.isOpen">
      <ng-container 
        *ngTemplateOutlet="recursive; context:{ $implicit: node.children }">
      </ng-container>
    </div>

  </div>

</ng-template>
