<div class="editor-toolbar">

  <button (click)="openColorPicker()">🎨 Elegir color</button>

  <input
    type="color"
    #colorPicker
    (input)="onColorSelected($event)"
    style="display: none"
  />


  <div class="color-preview" [style.background]="selectedColor"></div>

  <!-- FORMATO -->
  <select [(ngModel)]="format">
    <option value="hex">HEX</option>
    <option value="rgb">RGB</option>
  </select>

  <!-- VALOR -->
  <span class="color-value">
    {{ getFormattedColor() }}
  </span>

  <!-- ACCIONES -->
  <button (click)="insertColor()">➕ Insertar</button>
  <button (click)="copyColor()">📋 Copiar</button>

</div>

<div class="tabs-bar">
  <div
    class="tab"
    *ngFor="let tab of tabs"
    [class.active]="tab === activeFile"
    (click)="selectTab(tab)"
  >
    {{ tab }}
    <span class="close-btn"
      (click)="closeTab(tab); $event.stopPropagation()">✕</span>
  </div>
</div>

<div #editorContainer class="editor-container"></div>

<div class="status-bar">
  Ln {{ cursorPosition.line }}, Col {{ cursorPosition.column }}
</div>
